context:
  background: |
    The Auto-Crypto-Tradingjournal system uses a reaction-network architecture
    where enzymes transform a shared Substrate. Previously, ISCs (Invariant Safety
    Conditions) 005, 006, 007 acted as hard gates that blocked ALL trades when
    noise_flag=true, confluence_min_signals not met, or trajectory coincidence_risk=high.
    This caused the system to produce zero trades for extended periods during
    paper testing, making learning impossible (no data to learn from).
    The fix: convert these three ISCs from hard gates to soft penalties that
    reduce the effective score rather than blocking entirely.
    Additionally, LLM key management needed improvement: .env.example used
    unnumbered key vars (OPENROUTER_API_KEY) while the code and KeyManager
    support multiple numbered keys. Phase 1 aligns the env vars, config_loader,
    and adds fallback key support.
  key_facts:
    - "ISC-001 (SL set), ISC-002 (size within risk), ISC-003 (max positions) remain hard gates"
    - "ISC-004 (score above threshold) is the approval threshold check after penalties"
    - "DetectNoise writes noise_penalty_ratio (float 0.0-1.0) instead of noise_flag (bool)"
    - "ScoreConfluence applies confluence_penalty_ratio when indicators_aligned < confluence_min"
    - "ApproveTrade applies all soft penalties to effective score, checks approval_threshold"
    - "The daemon ISC gate only checks hard ISCs (001-004)"
    - "kill_zone renamed to liquidity_filter: outside = lower liquidity, not 'no trade'"
    - "conflicting_signals uses relative conflict_max_ratio instead of absolute threshold"
    - "effective_score = raw_score × (1 - noise_penalty) × (1 - confluence_penalty) × (1 - trajectory_penalty)"
    - "LLM keys use numbered env vars: PROVIDER_API_KEY_1, PROVIDER_API_KEY_2, etc."
    - "KeyManager supports round-robin with immediate failover on error"
  assumptions:
    - "Soft penalties are multiplicative"
    - "The learning engine can adjust penalty ratios over time based on trade outcomes"
    - "A trade with soft penalties applied still needs to meet approval_threshold to proceed"
    - "LLM fallback keys may be from different providers (cross-provider fallback)"

decisions:
  - date: "2025-07-14"
    decision: "Convert ISC-005/006/007 from hard gates to soft penalty ratios"
    rationale: "Hard gates produce zero trades during noisy periods, starving the learning engine of data. Soft penalties allow trades with reduced confidence, producing more training data."
    made_by: "user + agent"
  - date: "2025-07-14"
    decision: "Keep ISC-001/002/003 as hard gates (SL, size, max positions)"
    rationale: "These are genuine safety constraints — no trade should ever bypass SL validation, oversize risk, or exceed position limits."
    made_by: "user + agent"
  - date: "2025-07-14"
    decision: "Rename kill_zone to liquidity_filter and use relative conflict_max_ratio"
    rationale: "Kill zone implies 'do not trade here'. Liquidity filter implies 'less favorable conditions'. Relative thresholds adapt to market regime better than absolute ones."
    made_by: "agent"
  - date: "2026-06-09"
    decision: "Use numbered LLM key env vars (PROVIDER_API_KEY_1, _2, etc.)"
    rationale: "KeyManager already supports multiple keys per provider. Numbered env vars make it explicit and allow fallback keys without YAML config."
    made_by: "user + agent"


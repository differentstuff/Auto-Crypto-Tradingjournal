<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d2e;--bg3:#22263a;
  --accent:#6c63ff;--accent2:#4fc3f7;--accent3:#26d96b;
  --red:#ef5350;--muted:#7986cb;--border:#2d3250;--fg:#e8eaf6;
}
body{background:var(--bg);color:var(--fg);font-family:'Segoe UI',system-ui,sans-serif;
     height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;
       padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);
       flex-shrink:0;gap:12px;flex-wrap:wrap}
#chart-title{font-weight:700;font-size:1rem;letter-spacing:.02em}
#tf-btns{display:flex;gap:6px}
.tf-btn{padding:4px 13px;border-radius:5px;font-size:.75rem;cursor:pointer;
        border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:.15s}
.tf-btn:hover:not(.active){background:var(--bg);color:var(--fg)}
.tf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#chart-wrap{flex:1;min-height:0;position:relative}
#sr-legend{padding:7px 14px;background:var(--bg2);border-top:1px solid var(--border);
           display:flex;gap:6px;flex-wrap:wrap;min-height:34px;align-items:center;flex-shrink:0}
#status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        color:var(--muted);font-size:.85rem;pointer-events:none;z-index:10}
</style>
</head>
<body>
<header>
  <span id="chart-title">Loading…</span>
  <div id="tf-btns"></div>
</header>
<div id="chart-wrap"><div id="status">Loading chart…</div></div>
<div id="sr-legend"></div>

<script>
const params = new URLSearchParams(location.search);
let symbol = (params.get('symbol') || 'BTCUSDT').toUpperCase();
let tf     = params.get('timeframe') || '4H';
const TFS  = ['15m','1H','4H','1D'];
let _chart = null;

// Liquidation levels: liqs=[{price,label},...]
let _liquidations = [];
try {
  const raw = params.get('liqs');
  if (raw) _liquidations = JSON.parse(decodeURIComponent(raw));
} catch(e) {}

// Open position trade levels: trades=[{dir,entry,sl,tp1,tp2},...]
let _trades = [];
try {
  const raw = params.get('trades');
  if (raw) _trades = JSON.parse(decodeURIComponent(raw));
} catch(e) {}

document.title  = symbol + ' — Chart';
document.getElementById('chart-title').textContent = symbol;

// ── Canvas overlay: S/R boxes + liquidation dashed lines ──────────────────────
function _startOverlay(wrap, series, levels, htf_levels, liquidations) {
  // Remove any previous overlay canvas
  const old = wrap.querySelector('.sr-canvas');
  if (old) old.remove();

  const cv = document.createElement('canvas');
  cv.className  = 'sr-canvas';
  cv.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:3';
  wrap.appendChild(cv);

  function draw() {
    // Stop loop if canvas was removed (chart destroyed)
    if (!document.contains(cv)) return;

    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, w, h);

    // Price scale is ~65px wide on the right — leave it uncovered
    const chartW = w - 65;

    // ── Weekly S/R zones (gold/amber, heavier) ────────────────────────────────
    (htf_levels || []).forEach(lvl => {
      const hw = lvl.price * 0.004;
      const yT = series.priceToCoordinate(lvl.price + hw);
      const yB = series.priceToCoordinate(lvl.price - hw);
      if (yT === null || yB === null) return;
      const a = Math.min(0.10 + (lvl.touches - 1) * 0.04, 0.45).toFixed(3);
      ctx.fillStyle = `rgba(255,193,60,${a})`;
      const top = Math.min(yT, yB);
      const ht  = Math.max(Math.abs(yB - yT), 4);
      ctx.fillRect(0, top, chartW, ht);
    });

    // ── S/R grey boxes (darker = more touches) ────────────────────────────────
    (levels || []).forEach(lvl => {
      const hw = lvl.price * 0.003;               // half-width of zone (0.3%)
      const yT = series.priceToCoordinate(lvl.price + hw);
      const yB = series.priceToCoordinate(lvl.price - hw);
      if (yT === null || yB === null) return;
      // Alpha: min 0.07 (1 touch) → max 0.42 (many touches)
      const a   = Math.min(0.07 + (lvl.touches - 1) * 0.035, 0.42).toFixed(3);
      ctx.fillStyle = `rgba(180,183,210,${a})`;
      const top = Math.min(yT, yB);
      const ht  = Math.max(Math.abs(yB - yT), 3);
      ctx.fillRect(0, top, chartW, ht);
    });

    // ── Liquidation levels (yellow dashed) ────────────────────────────────────
    (liquidations || []).forEach(liq => {
      if (!liq.price) return;
      const y = series.priceToCoordinate(parseFloat(liq.price));
      if (y === null) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,213,60,0.9)';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([7, 4]);
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(chartW, y);
      ctx.stroke();
      ctx.restore();
      // Label on left side
      ctx.fillStyle = 'rgba(255,213,60,0.92)';
      ctx.font      = 'bold 11px "Segoe UI",sans-serif';
      ctx.fillText(`${liq.label} LIQ  ${liq.price}`, 8, y - 5);
    });

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

// ── TF buttons ────────────────────────────────────────────────────────────────
function renderTfBtns() {
  document.getElementById('tf-btns').innerHTML = TFS.map(t =>
    `<button class="tf-btn${t===tf?' active':''}" onclick="switchTf('${t}')">${t}</button>`
  ).join('');
}

async function switchTf(newTf) {
  tf = newTf;
  renderTfBtns();
  await loadChart();
}

// ── Main chart loader ─────────────────────────────────────────────────────────
async function loadChart() {
  const wrap = document.getElementById('chart-wrap');
  document.getElementById('status').textContent = 'Loading…';
  document.getElementById('status').style.display = 'flex';
  document.getElementById('sr-legend').innerHTML  = '';
  if (_chart) { _chart.remove(); _chart = null; }
  // Remove old overlay canvas now (new one created after chart builds)
  const old = wrap.querySelector('.sr-canvas');
  if (old) old.remove();

  let json;
  try {
    const r = await fetch(`/api/chart/candles?symbol=${symbol}&timeframe=${tf}&limit=200`);
    json = await r.json();
  } catch(e) {
    document.getElementById('status').textContent = 'Network error';
    return;
  }

  if (!json.ok) { document.getElementById('status').textContent = 'Error: ' + json.error; return; }

  const { candles, levels, htf_levels, trendlines, current_price } = json.data;
  if (!candles || !candles.length) {
    document.getElementById('status').textContent = 'No candle data for ' + symbol;
    return;
  }

  document.getElementById('status').style.display = 'none';

  _chart = LightweightCharts.createChart(wrap, {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout: { background: { type: 'solid', color: '#0f1117' }, textColor: '#7986cb' },
    grid:   { vertLines: { color: 'rgba(255,255,255,.04)' }, horzLines: { color: 'rgba(255,255,255,.04)' } },
    crosshair:       { mode: 1 },
    rightPriceScale: { borderColor: 'rgba(255,255,255,.1)' },
    timeScale:       { borderColor: 'rgba(255,255,255,.1)', timeVisible: true, secondsVisible: false },
  });

  const series = _chart.addCandlestickSeries({
    upColor: '#26d96b', downColor: '#ef5350',
    borderUpColor: '#26d96b', borderDownColor: '#ef5350',
    wickUpColor: '#26d96b', wickDownColor: '#ef5350',
  });
  series.setData(candles);
  // Push candlesticks up so volume bars have room at the bottom
  series.priceScale().applyOptions({ scaleMargins: { top: 0.04, bottom: 0.22 } });

  // Volume histogram — bottom 20% of chart, separate price scale
  const volSeries = _chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  _chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.82, bottom: 0 },
    visible: false,
  });
  volSeries.setData(candles.map(c => ({
    time:  c.time,
    value: c.volume,
    color: c.close >= c.open ? 'rgba(38,217,107,0.30)' : 'rgba(239,83,80,0.30)',
  })));

  // Axis labels for S/R (invisible line, just for the right-axis price label)
  (levels || []).forEach(lvl => {
    const isS = lvl.type === 'support';
    series.createPriceLine({
      price: lvl.price, lineWidth: 1, lineStyle: 0,
      color: 'rgba(180,183,210,0.25)',
      axisLabelVisible: true,
      title: `${isS ? 'S' : 'R'} ${lvl.touches}×`,
    });
  });

  // Axis labels for liquidation levels
  (_liquidations || []).forEach(liq => {
    series.createPriceLine({
      price: parseFloat(liq.price), lineWidth: 1, lineStyle: 0,
      color: 'rgba(255,213,60,0)',
      axisLabelVisible: true,
      title: `${liq.label} LIQ`,
    });
  });

  // Entry / SL / TP lines for open positions
  (_trades || []).forEach(t => {
    if (t.entry) series.createPriceLine({
      price: t.entry, lineWidth: 2, lineStyle: 0,
      color: 'rgba(79,195,247,0.85)',
      axisLabelVisible: true, axisLabelColor: 'rgba(79,195,247,0.25)',
      title: t.dir + ' ENTRY',
    });
    if (t.sl) series.createPriceLine({
      price: t.sl, lineWidth: 1.5, lineStyle: 2,
      color: 'rgba(239,83,80,0.85)',
      axisLabelVisible: true, axisLabelColor: 'rgba(239,83,80,0.25)',
      title: t.dir + ' SL',
    });
    if (t.tp1) series.createPriceLine({
      price: t.tp1, lineWidth: 1.5, lineStyle: 2,
      color: 'rgba(38,217,107,0.85)',
      axisLabelVisible: true, axisLabelColor: 'rgba(38,217,107,0.2)',
      title: t.dir + ' TP1',
    });
    if (t.tp2) series.createPriceLine({
      price: t.tp2, lineWidth: 1, lineStyle: 2,
      color: 'rgba(38,217,107,0.6)',
      axisLabelVisible: true, axisLabelColor: 'rgba(38,217,107,0.15)',
      title: t.dir + ' TP2',
    });
  });

  // Trendlines — lower TF first (drawn behind), higher TF last (drawn in front)
  const TL_ALPHA  = {1:.30, 2:.50, 3:.70, 4:.90};
  const TL_WIDTH  = {1:1,   2:1.5, 3:2,   4:2.5};
  [...(trendlines || [])].reverse().forEach(tl => {
    const isUp = tl.type === 'uptrend';
    const w    = tl.weight || 1;
    const a    = TL_ALPHA[w] ?? 0.5;
    const lw   = TL_WIDTH[w] ?? 1;
    const s = _chart.addLineSeries({
      color: isUp ? `rgba(38,217,107,${a})` : `rgba(239,83,80,${a})`,
      lineWidth: lw, lineStyle: 2,
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });
    s.setData([
      { time: tl.p1_time, value: tl.p1_price },
      { time: tl.p2_time, value: tl.p2_price },
    ]);
  });

  _chart.timeScale().fitContent();

  // Weekly S/R axis labels
  (htf_levels || []).forEach(lvl => {
    const isS = lvl.type === 'support';
    series.createPriceLine({
      price: lvl.price, lineWidth: 1, lineStyle: 0,
      color: 'rgba(255,193,60,0.3)',
      axisLabelVisible: true,
      title: `1W ${isS ? 'S' : 'R'} ${lvl.touches}×`,
    });
  });

  // Start canvas overlay (S/R boxes + liquidation lines)
  _startOverlay(wrap, series, levels, htf_levels, _liquidations);

  // ── Legend ──────────────────────────────────────────────────────────────────
  const leg   = document.getElementById('sr-legend');
  const chips = [];

  // Trade level chips (entry / SL / TP)
  (_trades || []).forEach(t => {
    function distChip(price) {
      if (!price || !current_price) return '';
      const d = ((price - current_price) / current_price * 100);
      return ` · ${d >= 0 ? '+' : ''}${d.toFixed(2)}%`;
    }
    if (t.entry) chips.push(
      `<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
        background:rgba(79,195,247,.12);color:rgba(79,195,247,.95);
        border:1px solid rgba(79,195,247,.25)">
        ▶ ${t.dir} ENTRY  ${t.entry}
      </span>`);
    if (t.tp1) chips.push(
      `<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
        background:rgba(38,217,107,.1);color:rgba(38,217,107,.95);
        border:1px solid rgba(38,217,107,.22)">
        ✦ ${t.dir} TP1  ${t.tp1}${distChip(t.tp1)}
      </span>`);
    if (t.tp2) chips.push(
      `<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
        background:rgba(38,217,107,.07);color:rgba(38,217,107,.75);
        border:1px solid rgba(38,217,107,.15)">
        ✦ ${t.dir} TP2  ${t.tp2}${distChip(t.tp2)}
      </span>`);
    if (t.sl) chips.push(
      `<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
        background:rgba(239,83,80,.1);color:rgba(239,83,80,.95);
        border:1px solid rgba(239,83,80,.22)">
        ✕ ${t.dir} SL  ${t.sl}${distChip(t.sl)}
      </span>`);
  });

  (_liquidations || []).forEach(liq => {
    chips.push(`<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
      background:rgba(255,213,60,.1);color:rgba(255,213,60,.95);
      border:1px solid rgba(255,213,60,.2)">
      ⚡ ${liq.label} LIQ  ${liq.price}
    </span>`);
  });

  (trendlines || []).forEach(tl => {
    const isUp = tl.type === 'uptrend';
    const tf   = tl.timeframe ? `<b style="opacity:.75;font-size:.63rem">${tl.timeframe}</b> ` : '';
    chips.push(`<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
      background:${isUp?'rgba(38,217,107,.07)':'rgba(239,83,80,.07)'};
      color:${isUp?'#26d96b':'#ef5350'};
      border:1px solid ${isUp?'rgba(38,217,107,.18)':'rgba(239,83,80,.18)'}"
      title="${tl.anchor1} → ${tl.anchor2}">
      ${tf}${isUp?'↗ Up':'↘ Down'} TL (${tl.touches}×)
    </span>`);
  });

  (htf_levels || []).forEach(lvl => {
    const isS  = lvl.type === 'support';
    const dist = current_price ? ((lvl.price-current_price)/current_price*100).toFixed(1) : null;
    const dtxt = dist !== null ? ` · ${dist>0?'+':''}${dist}%` : '';
    chips.push(`<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
      background:rgba(255,193,60,0.10);color:rgba(255,193,60,0.95);
      border:1px solid rgba(255,193,60,0.25)"
      title="Weekly timeframe structural level">
      1W ${isS?'▲ S':'▼ R'} ${lvl.price}${dtxt} (${lvl.touches}×)
    </span>`);
  });

  [...(levels||[])].reverse().forEach(lvl => {
    const isS  = lvl.type === 'support';
    const dist = current_price ? ((lvl.price-current_price)/current_price*100).toFixed(1) : null;
    const dtxt = dist !== null ? ` · ${dist>0?'+':''}${dist}%` : '';
    chips.push(`<span style="font-size:.72rem;padding:3px 9px;border-radius:4px;
      background:rgba(180,183,210,0.08);color:${isS?'#c8cade':'#a0a8cc'}">
      ${isS?'▲ S':'▼ R'} ${lvl.price}${dtxt} (${lvl.touches}×)
    </span>`);
  });

  leg.innerHTML = chips.length
    ? chips.join('')
    : '<span style="color:#7986cb;font-size:.74rem">No S/R or trendlines detected</span>';
}

window.addEventListener('resize', () => {
  if (_chart) {
    const wrap = document.getElementById('chart-wrap');
    _chart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight });
  }
});

renderTfBtns();
loadChart();
</script>
</body>
</html>

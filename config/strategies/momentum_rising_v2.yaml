# momentum_rising_v2.yaml -- MACD-primary momentum strategy (long + short)
# ────────────────────────────────────────────────────────────────────
# Evolved from momentum_rising.yaml. Key differences:
#   - MACD is the primary signal (weight 0.45), not equal-weight
#   - EMA/ADX act as cofactors (directional filter + trend existence)
#   - RSI is an extreme filter (safety valve, not a scorer)
#   - Lower entry threshold (5.5 vs 6.5) — catches early momentum
#   - Fading MACD penalized harder (0.3 vs 0.5) — only enter when momentum builds
#   - momentum_quality indicator included for dynamic filter ranking
#   - Symmetric long/short: positive score = long, negative = short
#
# Enzyme analogy: MACD crossover is the substrate (the signal transformed
# into a trade). EMA alignment and ADX are cofactors — they must be
# present for the reaction to proceed, but they don't drive it.
# RSI is a safety valve against extreme entries.

description: |
  MACD-primary momentum strategy for both long and short entries.

  Entry logic:
    - MACD crossover + growing histogram = primary signal (weight 0.45)
    - EMA stack alignment = directional confirmation (weight 0.25)
    - ADX > 20 = trend existence filter (weight 0.15)
    - RSI as extreme filter — avoid overbought longs / oversold shorts (weight 0.15)

  Both long and short entries are supported. Positive confluence scores → long.
  Negative confluence scores → short. Symmetric thresholds apply.

  Confirmation timeframe (4h) acts as a trend filter: entries are neutralized
  when primary (1h) and confirmation (4h) timeframes disagree on direction.

  Trail stops once price moves 0.5% in our direction.
  Never enter when the market is noisy or conflicting.
  Maximum 3 positions at once, 1% risk per trade.

strategy:
  name: momentum_rising_v2
  uid: "ef681354-8afc-48e5-8302-9a5fc2c23217"   # Auto-generated on first load. Remove or clear to reset learning data.
  timeframe: "1h"
  confirmation_tf: "4h"
  max_positions: 3
  cycle_interval_minutes: 15

symbols:
  mode: "combined"                  # "combined" = always_watch + dynamic top-N from exchange
  always_watch:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  never_trade:
    - SHIBUSDT
    - BOMEUSDT
  dynamic_filter:
    universe_source: "exchange"     # Only 'exchange' is supported — do not change
    limit: 15                       # max dynamic symbols to select (ranked by momentum_quality)
    min_volume_24h_usd: 10000000    # minimum 24h volume filter (USD)
    min_open_interest_usd: 2000000  # minimum open interest filter (USD)
    min_r_squared: 0.15             # minimum R² for momentum quality — below this, symbol is filtered
    refresh_interval_hours: 4       # how often to re-fetch universe and re-rank

indicators:
  # ── Primary signal ──────────────────────────────────────────────
  - name: "macd"
    params:
      fast: 12
      slow: 26
      signal: 9
    weight: 0.45
    description: "PRIMARY: MACD crossover + growing histogram = momentum building. Cross above signal = bullish, below = bearish. Growing histogram confirms acceleration."

  # ── Directional cofactor ────────────────────────────────────────
  - name: "ema_stack"
    params:
      periods: [21, 55, 200]
    weight: 0.25
    description: "COFACTOR: EMA 21 above 55 above 200 = bullish structure. Confirms directional bias. Partial alignment still contributes — trend may be forming."

  # ── Trend existence filter ──────────────────────────────────────
  - name: "adx"
    params:
      period: 14
    weight: 0.15
    description: "COFACTOR: ADX measures trend strength regardless of direction. ADX > 20 = trend exists (safe to enter). ADX < 15 = no trend (avoid). Scales contribution by strength."

  # ── Extreme filter ──────────────────────────────────────────────
  - name: "rsi"
    params:
      period: 14
    weight: 0.15
    description: "SAFETY: RSI above 55 contributes bullish, below 45 bearish. Dead-band 45-55 = neutral (no contribution). Prevents entries at extremes — RSI > 70 adds risk to longs."

  # ── Non-scoring indicators (weight 0) ───────────────────────────
  - name: "atr"
    params:
      period: 14
    weight: 0.0
    description: "ATR determines stop loss width and entry zone size. Not a directional signal."

  - name: "sr_levels"
    params:
      tolerance: 0.004
      min_touches: 3
    weight: 0.0
    description: "Support and resistance levels define entry zones. Require at least 3 touches for validity."

  - name: "momentum_quality"
    params:
      ranking_window: 90
      min_r_squared: 0.15
      lookback_short: 30
      lookback_long: 90
      r_squared_high: 0.5
      r_squared_low: 0.3
    weight: 0.0
    description: "Momentum quality ranking (slope × R²) for dynamic symbol filter. Not a scoring indicator — used by DynamicFilter enzyme to rank and select symbols."

scoring:
  entry_threshold: 5.5
  confluence_min_signals: 2          # MACD + one cofactor is sufficient (was 3)
  rr_minimum: 2.0
  min_candidate_pct: 0.20
  rsi_signal_high: 55
  rsi_signal_low: 45
  momentum_cap: 1.5
  momentum_dampening: 0.5
  modifier_weights:
    volume: 0.15
    cvd: 0.1
    order_flow: 0.1
  label_thresholds:
    strong: 0.60
    weak: 0.33
  score_calibration:
    suppress_below_pct: 55
    highlight_above_pct: 75
    review_range_pct: [55, 60]
  # ── Formula overrides (differences from default.yaml) ───────────
  # Fading MACD penalized harder: only enter when momentum is BUILDING,
  # not when it's already waning. Growing=1.0, Fading=0.3 (was 0.5).
  formula:
    macd_aligned_fading: 0.3

exit_rules:
  hard_stop:
    placement: "below_support"
    width_atr_multiplier: 1.5
    always_active: true
  trailing_stop:
    enabled: true
    activation_profit_pct: 0.5
    trail_atr_multiplier: 1.0
    breakeven_at_activation: true
    distance_pct: 1.0
    move_to_breakeven_at_pct: 1.5
  # ── Structure-aware exits ──────────────────────────────────────────────
  # Exit immediately when market structure breaks, phase shifts to range,
  # or a counter-structure breakout occurs. These override all other exit logic.
  structure_aware_exits: true
  structure_break_exit: true           # exit on structure break
  phase_range_exit: true               # exit when phase shifts to range (was trending)
  counter_breakout_exit: true          # exit on counter-structure breakout
  deep_pullback_stop_multiplier: 0.5   # tighten stop to 0.5x ATR on deep pullback
  shallow_pullback_stop_multiplier: 1.0 # keep stop at 1.0x ATR on shallow pullback
  # ── Progressive trailing stop ─────────────────────────────────────────
  # Trail tightens as profit grows, locking in gains without capping upside.
  # Structure-aware: tightens extra when phase=pullback or pullback_depth=deep.
  progressive_trail: true
  progressive_trail_schedule:           # profit_atr_level → trail_distance (x ATR)
    0: 1.0                              # at entry: 1x ATR (same as current)
    1: 0.75                             # at +1x ATR profit: tighten to 0.75x
    2: 0.5                              # at +2x ATR profit: tighten to 0.5x
    3: 0.25                             # at +3x ATR profit: tighten to 0.25x
  # Structure-aware trail enhancement
  pullback_trail_tighten: 0.75          # multiply trail by 0.75 when phase = pullback
  deep_pullback_trail_tighten: 0.5      # multiply trail by 0.5 when pullback is deep
  soft_exit:
    requires_indicators_reversed: 2
    requires_confirmation_tf: true
    urgency: "soft"
  soft_reversal_profit_threshold: 0.5
  near_sl_urgency_pct: 0.5
  tp1_sell_pct: 40.0              # % of total position to sell at TP1 (remainder runs with trailing stop)
  tp2_sell_pct: 40.0              # % of REMAINING position to sell at TP2 (100 = close all remaining)

# ── Structure detection config ────────────────────────────────────────────────
# Parameters for MarketGeometry enzyme (swing detection, trend classification)
structure:
  swing_lookback: 5                     # bars before/after for swing detection
  min_swing_points: 4                   # minimum swings needed for trend classification
  trend_violation_tolerance_pct: 0.5    # allow one swing violation < this %

learning:
  min_trades_before_adjusting: 30
  min_trades_per_signal: 15
  significance_level: 0.05
  rulebook_max_rules: 10
  retrain_every_n_trades: 10
  track_idle_cycles: true
  trajectory_lookback_hours: 48
  trajectory_min_hours: 8
  trajectory_thresholds:
    stable_consensus: 10
    gradual_alignment: 8
    earlier_min: 3
    recent_min: 2
    earlier_low: 2
    min_alignment: 4
  contrarian_win_rate: 30.0
  highlight_threshold: 75.0
  monitor_low_threshold: 55.0
  suppress_range: [45.0, 55.0]
  contrarian_threshold: 30.0

portfolio:
  max_positions: 3
  risk_per_trade_pct: 1.0
  leverage: 5
  max_total_risk_pct: 3.0
  fallback_equity_usdt: 1000.0
  correlation_check: true
  max_same_direction: 3
  volatility_cap_pct: 20.0              # Volatility backstop (ATR%-based, asset-price-agnostic)
  max_notional_exposure_pct: 100.0      # Hard ceiling on notional exposure (flash crash protection)

risk:
  kelly_min: 0.05
  kelly_max: 0.25
  kelly_win_rate_base: 0.35
  kelly_win_rate_range: 0.40
  kelly_avg_win_r: 2.0
  max_size_pct_of_equity: 25.0
  min_size_pct_of_equity: 5.0

noise:
  conflict_max_ratio: 0.5
  volume_low_ratio: 0.7
  volume_very_low_ratio: 0.5
  adx_no_trend: 15
  adx_overextended: 40
  noise_severity_min_reasons: 2

telegram:
  idle_notify_every: 10

modules:
  macro_context: false
  regime_detection: true
  sentiment: false
  onchain: false
  liquidation: false
  model_consensus: false
  telegram_logs: false
  telegram_interaction: false

llm:
  enabled: false
  relax_factor: 0.8

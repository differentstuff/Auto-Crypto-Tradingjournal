# config/strategies/_template.yaml
# Reference template containing EVERY possible strategy config key.
# If a key exists here, it MUST exist in every strategy file.
# If a key is missing from a strategy, the system fails — not falls back.
# Copy this file to create a new strategy, then customize values.

strategy:
  name: ""                       # strategy identifier (must match filename without .yaml)
  uid: ""                        # stable UID for learning data isolation (auto-generated on first load, clear to reset)
  timeframe: "4h"                 # primary candle timeframe for indicator computation
  confirmation_tf: "1d"          # higher timeframe for trend alignment check (set to null to skip)
  max_positions: 3                # maximum concurrent open positions
  cycle_interval_minutes: 15     # minutes between daemon cycles

daemon:
  jitter_seconds: 30             # random 0–N seconds added to cycle sleep; prevents API thundering herd

symbols:
  mode: "static"                    # "static" = always_watch only | "combined" = always_watch + dynamic top-N
  always_watch:                   # symbol pairs to always monitor
    - BTCUSDT
    - ETHUSDT
  never_trade:                    # symbol pairs to never trade
    - SHIBUSDT
  dynamic_filter:
    universe_source: "exchange"     # "exchange" = fetch all USDT-M perps from Bitget API
    limit: 15                       # max dynamic symbols to select (ranked by momentum_quality)
    min_volume_24h_usd: 10000000    # minimum 24h volume filter (USD)
    min_open_interest_usd: 2000000  # minimum open interest filter (USD)
    min_r_squared: 0.15             # minimum R² for momentum quality — below this, symbol is filtered
    refresh_interval_hours: 4       # how often to re-fetch universe and re-rank

indicators:
  - name: "rsi"
    params:
      period: 14
    weight: 0.25
    description: "RSI below 30 = oversold. RSI above 70 = overbought."
  - name: "macd"
    params:
      fast: 12
      slow: 26
      signal: 9
    weight: 0.25
    description: "MACD histogram rising = momentum building."
  - name: "ema_stack"
    params:
      periods: [21, 55, 200]
    weight: 0.30
    description: "EMA 21 above 55 above 200 = bullish trend structure."
  - name: "adx"
    params:
      period: 14
    weight: 0.20
    description: "ADX 25-35 = healthy trend. Avoid >40 or <15."
  - name: "atr"
    params:
      period: 14
    weight: 0.0
    description: "ATR for SL width and position sizing, not scoring."
  - name: "sr_levels"
    params:
      tolerance: 0.004
      min_touches: 3
    weight: 0.0
    description: "S/R levels for entry zone validation, not scoring."
  - name: "momentum_quality"
    params:
      ranking_window: 90
      min_r_squared: 0.15
      lookback_short: 30
      lookback_long: 90
      r_squared_high: 0.5
      r_squared_low: 0.3
    weight: 0.0
    description: "Momentum quality ranking (slope × R²) for dynamic symbol filter."

scoring:
  entry_threshold: 6.5           # minimum confluence score to consider entry
  confluence_min_signals: 3      # minimum number of aligned indicators for entry
  rr_minimum: 2.0                # minimum risk:reward ratio for entry
  min_candidate_pct: 0.20        # minimum confluence % for a symbol to appear in candidates; lower = more candidates (more noise)
  rsi_signal_high: 55            # RSI above this = bullish directional signal; dead-band is (100 - high) to high
  rsi_signal_low: 45             # RSI below this = bearish directional signal; mirror of rsi_signal_high
  momentum_cap: 1.5              # maximum combined RSI+MACD contribution before dampening; lower = more conservative
  momentum_dampening: 0.5        # how much excess momentum (above cap) is reduced; 1.0 = fully remove, 0 = no dampening
  modifier_weights:
    volume: 0.15                  # how much volume confirmation moves the score; raise if volume data is reliable
    cvd: 0.1                      # how much CVD (cumulative volume delta) moves the score; only if data source provides CVD
    order_flow: 0.1              # how much order flow pressure moves the score; only if data source provides it
  label_thresholds:
    strong: 0.60                 # confluence % for "Strong Bullish/Bearish" label (display-only)
    weak: 0.33                   # confluence % for "Bullish/Bearish" label; below this = "Neutral" (display-only)
  score_calibration:
    suppress_below_pct: 55       # accuracy below this → suppress signal weight
    highlight_above_pct: 75     # accuracy above this → highlight signal
    review_range_pct:
      - 55
      - 60                       # accuracy in this range → review signal
  # Scoring formula constants — internal normalization factors.
  # These define how raw indicator values map to contribution scores.
  # Final contribution = indicator_weight × formula_factor.
  # Do NOT change these casually — they define the scoring model's shape.
  # They are here for transparency, not for frequent tuning.
  formula:
    rsi_midpoint: 50              # RSI midpoint for neutral zone
    rsi_scale: 30.0               # RSI scaling divisor: (rsi - midpoint) / scale
    macd_aligned_growing: 1.0     # MACD contribution when aligned and histogram growing
    macd_aligned_fading: 0.5     # MACD contribution when aligned but histogram fading
    ema_full_alignment: 1.0       # EMA contribution when fully aligned
    ema_partial_alignment: 0.5   # EMA contribution when partially aligned
    adx_scale: 50.0              # ADX scaling divisor: adx_value / scale
    wavetrend_gold_signal: 1.0    # WaveTrend gold_buy signal contribution
    wavetrend_signal: 0.85       # WaveTrend regular buy/sell signal contribution
    wavetrend_wt1_scale: 60.0    # WaveTrend WT1 scaling divisor: wt1 / scale
    wavetrend_no_signal_cap: 0.5  # WaveTrend cap when no fresh crossover
    volume_confirm: 0.5          # Volume contribution when confirming direction
    volume_weaken: -0.25         # Volume contribution when weakening direction
    cvd_trend: 0.4               # CVD contribution for rising/falling trend
    order_flow_pressure: 0.15    # Order flow contribution for buying/selling pressure
    mfi_threshold: 10            # MFI threshold for significant deviation
    mfi_contribution: 0.3       # MFI contribution per deviation above threshold

exit_rules:
  hard_stop:
    placement: "below_support"   # hard stop placement method
    width_atr_multiplier: 1.5    # ATR multiplier for hard stop distance
    always_active: true          # hard stop is always active
  trailing_stop:
    enabled: true                # enable trailing stop
    activation_profit_pct: 0.5   # profit % before trailing stop activates
    trail_atr_multiplier: 1.0   # ATR multiplier for trailing distance
    breakeven_at_activation: true # move SL to entry when trailing activates
    distance_pct: 1.0            # trailing distance as % of price
    move_to_breakeven_at_pct: 1.5 # profit % at which SL moves to breakeven
  # ── Structure-aware exits (A) ────────────────────────────────────────
  # Exit immediately when market structure breaks, phase shifts to range,
  # or a counter-structure breakout occurs. Disabled by default for backward
  # compatibility — enable in strategy config when MarketGeometry enzyme is active.
  structure_aware_exits: false        # enable A: structure-aware exits (requires MarketGeometry enzyme)
  structure_break_exit: true          # exit on structure break (only active when structure_aware_exits=true)
  phase_range_exit: true              # exit when phase shifts to range (was trending)
  counter_breakout_exit: true         # exit on counter-structure breakout
  deep_pullback_stop_multiplier: 0.5  # tighten stop to 0.5x ATR on deep pullback
  shallow_pullback_stop_multiplier: 1.0 # keep stop at 1.0x ATR on shallow pullback
  # ── Progressive trailing stop (B) ───────────────────────────────────
  # Trail tightens as profit grows, locking in gains without capping upside.
  # Disabled by default for backward compatibility.
  progressive_trail: false            # enable B: progressive trailing stop
  progressive_trail_schedule:         # profit_atr_level → trail_distance (x ATR)
    0: 1.0                            # at entry: 1x ATR (same as current)
    1: 0.75                           # at +1x ATR profit: tighten to 0.75x
    2: 0.5                            # at +2x ATR profit: tighten to 0.5x
    3: 0.25                           # at +3x ATR profit: tighten to 0.25x
  # Structure-aware trail enhancement (only active when progressive_trail=true)
  pullback_trail_tighten: 0.75        # multiply trail by 0.75 when phase = pullback
  deep_pullback_trail_tighten: 0.5    # multiply trail by 0.5 when pullback is deep
  soft_exit:
    requires_indicators_reversed: 2  # number of indicators that must reverse for soft exit
    requires_confirmation_tf: true    # confirmation TF must also reverse for soft exit
    urgency: "soft"                  # soft exit urgency level
  soft_reversal_profit_threshold: 0.5  # profit % below which a signal reversal exits immediately; above it, reversal is ignored
  near_sl_urgency_pct: 0.5           # distance to SL below this % → high urgency

# ── Structure detection config ────────────────────────────────────────────────
# Parameters for MarketGeometry enzyme (swing detection, trend classification).
# Only used when MarketGeometry enzyme is registered in the daemon pipeline.
structure:
  swing_lookback: 5                     # bars before/after for swing detection
  min_swing_points: 4                   # minimum swings needed for trend classification
  trend_violation_tolerance_pct: 0.5    # allow one swing violation < this %

learning:
  min_trades_before_adjusting: 30  # minimum trades before learning adjusts weights
  min_trades_per_signal: 15        # minimum trades per indicator before accuracy is tracked
  significance_level: 0.05         # statistical significance threshold for combinations
  rulebook_max_rules: 10           # maximum rules in generated rulebook
  retrain_every_n_trades: 10       # retrain rulebook every N new trades
  track_idle_cycles: true          # track idle cycle reasons for learning
  trajectory_lookback_hours: 48    # hours of indicator history for trajectory analysis
  trajectory_min_hours: 8          # minimum hours of history before trajectory is valid
  trajectory_thresholds:
    stable_consensus: 10           # bars aligned for "stable_consensus" — lowest coincidence risk
    gradual_alignment: 8          # bars aligned for "gradual_alignment" (also needs earlier_min)
    earlier_min: 3                # minimum earlier-aligned bars for "gradual_alignment" vs "sudden_coincidence"
    recent_min: 2                 # recent-aligned bars that trigger "sudden_coincidence" if earlier alignment is low
    earlier_low: 2                # if earlier-aligned bars are below this, recent alignment counts as "sudden"
    min_alignment: 4              # minimum bars aligned for any trajectory classification (else "no_alignment")
  contrarian_win_rate: 30.0        # win rate below which a signal is contrarian (anti-signal)
  highlight_threshold: 75.0       # accuracy above this → signal is highlighted
  monitor_low_threshold: 55.0     # accuracy below this → signal is monitored
  suppress_range:
    - 45.0
    - 55.0                        # accuracy in this range → signal is suppressed
  contrarian_threshold: 30.0      # accuracy at or below this → signal is contrarian
  # Weight adjustment multipliers (applied by weight_adjuster.py)
  # "valid" verdict → weight × boost, "review" verdict → weight × reduce
  # These are single-pass factors, not compounded with indicator weights.
  adjustment_boost: 1.2          # +20% for signals with ≥75% accuracy
  adjustment_review_reduce: 0.9    # -10% for borderline signals (30-45% accuracy)

# Risk parameters (position sizing)
risk:
  kelly_min: 0.05                 # minimum Kelly fraction — floor for position sizing on weak signals
  kelly_max: 0.25                 # maximum Kelly fraction — cap for position sizing on strong signals (0.25 = quarter-Kelly)
  kelly_win_rate_base: 0.35       # base win rate assumed when score = 0; higher = more aggressive sizing
  kelly_win_rate_range: 0.40      # win rate increase per 10-point score increase
  kelly_avg_win_r: 2.0            # average R:R assumed for Kelly formula; higher = larger positions
  max_size_pct_of_equity: 25.0    # maximum position size as % of equity (hard cap regardless of Kelly)
  min_size_pct_of_equity: 5.0     # minimum position size as % of equity (below this = too small to be meaningful)

portfolio:
  max_positions: 3                # maximum concurrent open positions (strategy-level override)
  risk_per_trade_pct: 1.0        # percentage of equity risked per trade
  leverage: 5                     # leverage multiplier for position sizing
  max_total_risk_pct: 3.0        # maximum total portfolio risk percentage
  fallback_equity_usdt: 1000.0   # equity used in paper mode when no real equity available
  correlation_check: true        # check correlation between positions
  max_same_direction: 3           # maximum positions in the same direction
  volatility_cap_pct: 20.0              # Volatility backstop (ATR%-based, asset-price-agnostic)
  max_notional_exposure_pct: 100.0      # Hard ceiling on notional exposure (flash crash protection)

noise:
  conflict_max_ratio: 0.5          # max ratio of conflicting signals (relative threshold)
  volume_low_ratio: 0.7            # volume ratio below which volume is considered low
  volume_very_low_ratio: 0.5       # volume ratio below which volume is considered very low
  adx_no_trend: 15                 # ADX below this = no trend (noise)
  adx_overextended: 40             # ADX above this = overextended (noise)
  noise_severity_min_reasons: 2     # minimum noise reasons to flag as noisy

telegram:
  idle_notify_every: 10          # notify every N idle cycles when telegram_logs is enabled

# Macro context thresholds (used by CollectMacroContext)
macro:
  vix_risk_off: 30              # VIX above this → risk-off regime
  vix_neutral: 20               # VIX above this (but below risk_off) → neutral regime
  yfinance_period: "2d"         # yfinance download period for VIX/DXY
  yfinance_interval: "1h"       # yfinance download interval for VIX/DXY

# Data fetch defaults
exchange:
  ohlcv_limit: 200               # Number of candles to fetch per OHLCV call

# ISC (hard-to-vary conditions) — config-driven, no hardcoded IDs
# Each condition is fully defined here. substrate.py reads these at init.
validity:
  - id: ISC-001
    criterion: "entry_threshold met before any trade opens"
    verification: "analysis.candidates not empty AND score >= threshold"
    field: "analysis.candidates"
    operator: "any_score_gte"
    value_ref: "scoring.entry_threshold"
    field_key: "score"
  - id: ISC-002
    criterion: "stop loss always set before position opens"
    verification: "decisions.trade_approved.sl_price > 0"
    field: "decisions.trade_approved"
    operator: "sl_set_or_no_trade"
    value_ref: ""
    field_key: "sl_price"
  - id: ISC-003
    criterion: "position size within risk limit"
    verification: "trade_approved.size_usdt <= equity * risk_per_trade_pct / 100"
    field: "decisions.trade_approved"
    operator: "size_within_risk"
    value_ref: ""
    field_key: "size_usdt"
  - id: ISC-004
    criterion: "max concurrent positions not exceeded"
    verification: "portfolio.open_positions count < strategy.max_positions"
    field: "portfolio.open_positions"
    operator: "count_lt"
    value_ref: "strategy.max_positions"
    field_key: ""

# Soft penalties — replace former hard-gate ISCs (005/006/007)
# effective_score = raw_score × (1 - noise_penalty) × (1 - confluence_penalty) × (1 - trajectory_penalty)
soft_penalties:
  noise_penalty_ratio: 0.3        # penalty when noise detected (0.0 = no penalty, 1.0 = full block)
  confluence_penalty_ratio: 0.3   # penalty when indicators_aligned < confluence_min_signals
  trajectory_penalty_ratio: 0.5   # penalty when coincidence_risk is high (sudden coincidence)
  trajectory_medium_ratio: 0.2    # penalty when coincidence_risk is medium (diverging)

# Challenger system (disabled by default)
# When enabled, weight adjustments go through the CandidateQueue and
# must pass challenger paper-trading validation before reaching production.
challenger:
  enabled: false
  min_trades: 5                 # minimum hypothetical trades before evaluation
  min_improvement: 0.1          # minimum profit factor improvement (10%) to promote

# Karpathy experiment loop (disabled by default)
# Proposes one parameter change at a time, backtests, pushes to CandidateQueue.
karpathy:
  enabled: false
  step_size: 0.05               # weight change per experiment step
  max_experiments_per_cycle: 1  # experiments per daemon cycle

# Hyperopt prefilter (disabled by default)
# Systematic parameter search via Optuna TPE, pushes top candidates to CandidateQueue.
hyperopt:
  enabled: false
  n_trials: 100                 # Optuna trials per search
  top_n_candidates: 3           # candidates pushed to queue per search
  search_interval_hours: 24     # minimum hours between searches

# LLM configuration (shared by all strategies)
# Detailed routing, providers, and prompts live in config/llm.yaml.
# Do not override llm: here — the router reads from the merged config.
llm:
  enabled: true
  relax_factor: 0.8

modules:
  macro_context: false           # enable macro context data collection
  regime_detection: false        # enable regime detection
  sentiment: false               # enable sentiment analysis
  onchain: false                 # enable on-chain data
  liquidation: false             # enable liquidation data
  model_consensus: false         # enable model consensus
  telegram_logs: false            # enable Telegram log notifications
  telegram_interaction: false    # enable Telegram interaction

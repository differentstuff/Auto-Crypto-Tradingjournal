# paper_test.yaml -- Minimal paper trading strategy for quick validation.
# Uses only RSI + ATR, no confirmation TF, no dynamic scan, no modules.
# Run: python main.py --paper --strategy paper_test

description: "Minimal paper test: 1 symbol, 2 indicators, no modules, no dynamic scan."

strategy:
  name: paper_test
  uid: ""
  timeframe: "4h"
  confirmation_tf: null      # skip 2nd timeframe → 1 API call instead of 2
  max_positions: 1
  cycle_interval_minutes: 15

symbols:
  always_watch:
    - BTCUSDT
  never_trade: []
  dynamic_filter:
    mode: "off"
    limit: 0                 # no dynamic scanning, no 100+ symbol ranking
    criteria: "momentum"
    min_volume_24h_usd: 0
    min_open_interest_usd: 0

indicators:
  - name: "rsi"
    params: { period: 14 }
    weight: 0.5
    description: "RSI oversold/overbought."
  - name: "atr"
    params: { period: 14 }
    weight: 0.0              # infrastructure only
    description: "ATR for SL sizing."

scoring:
  entry_threshold: 6.5
  confluence_min_signals: 3
  rr_minimum: 2.0
  score_calibration:
    suppress_below_pct: 55
    highlight_above_pct: 75
    review_range_pct: [55, 60]

exit_rules:
  hard_stop:
    placement: "below_support"
    width_atr_multiplier: 1.5
    always_active: true
  trailing_stop:
    enabled: false
    activation_profit_pct: 0.5
    trail_atr_multiplier: 1.0
    breakeven_at_activation: true
    distance_pct: 1.0
    move_to_breakeven_at_pct: 1.5
  soft_exit:
    requires_indicators_reversed: 2
    requires_confirmation_tf: false
    urgency: "soft"

learning:
  min_trades_before_adjusting: 15
  min_trades_per_signal: 10
  significance_level: 0.05
  rulebook_max_rules: 10
  retrain_every_n_trades: 5
  track_idle_cycles: true
  trajectory_lookback_hours: 24
  trajectory_min_hours: 4
  contrarian_win_rate: 30.0
  highlight_threshold: 75.0
  monitor_low_threshold: 55.0
  suppress_range: [45.0, 55.0]
  contrarian_threshold: 30.0

portfolio:
  max_positions: 1
  risk_per_trade_pct: 1.0
  leverage: 5
  max_total_risk_pct: 1.0
  fallback_equity_usdt: 1000.0
  correlation_check: false
  max_same_direction: 1

noise:
  conflict_signal_threshold: 2
  volume_low_ratio: 0.7
  volume_very_low_ratio: 0.5
  adx_no_trend: 15
  adx_overextended: 40
  noise_severity_min_reasons: 2

telegram:
  idle_notify_every: 10

modules:
  macro_context: false
  regime_detection: false
  sentiment: false
  onchain: false
  liquidation: false
  model_consensus: false
  telegram_logs: false
  telegram_interaction: false
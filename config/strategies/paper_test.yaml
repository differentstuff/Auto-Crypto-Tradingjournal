# paper_test.yaml -- Minimal paper trading strategy for quick validation.
# Uses only RSI + ATR, no confirmation TF, no dynamic scan, no modules.
# Run: python main.py --paper --strategy paper_test

description: "Minimal paper test: 1 symbol, 2 indicators, no modules, no dynamic scan."

strategy:
  name: paper_test
  uid: ""
  timeframe: "4h"
  confirmation_tf: null      # skip 2nd timeframe → 1 API call instead of 2
  max_positions: 1
  cycle_interval_minutes: 15

symbols:
  mode: "static"                    # "static" = always_watch only (no dynamic filtering)
  always_watch:
    - BTCUSDT
  never_trade: []
  dynamic_filter:
    universe_source: "exchange"     # fetch all USDT-M perps from Bitget API
    limit: 0                        # 0 = no dynamic symbols (static mode)
    min_volume_24h_usd: 0           # no volume filter
    min_open_interest_usd: 0        # no OI filter
    min_r_squared: 0.15             # minimum R² for momentum quality
    refresh_interval_hours: 4       # how often to re-fetch universe and re-rank

indicators:
  - name: "rsi"
    params: { period: 14 }
    weight: 0.5
    description: "RSI oversold/overbought."
  - name: "atr"
    params: { period: 14 }
    weight: 0.0              # infrastructure only
    description: "ATR for SL sizing."

scoring:
  entry_threshold: 6.5
  confluence_min_signals: 3
  rr_minimum: 2.0
  min_candidate_pct: 0.20
  rsi_signal_high: 55
  rsi_signal_low: 45
  momentum_cap: 1.5
  momentum_dampening: 0.5
  modifier_weights:
    volume: 0.15
    cvd: 0.1
    order_flow: 0.1
  label_thresholds:
    strong: 0.60
    weak: 0.33
  score_calibration:
    suppress_below_pct: 55
    highlight_above_pct: 75
    review_range_pct: [55, 60]

exit_rules:
  hard_stop:
    placement: "below_support"
    width_atr_multiplier: 1.5
    always_active: true
  trailing_stop:
    enabled: false
    activation_profit_pct: 0.5
    trail_atr_multiplier: 1.0
    breakeven_at_activation: true
    distance_pct: 1.0
    move_to_breakeven_at_pct: 1.5
  # ── Structure-aware exits (disabled for minimal test) ──
  structure_aware_exits: false
  structure_break_exit: true
  phase_range_exit: true
  counter_breakout_exit: true
  deep_pullback_stop_multiplier: 0.5
  shallow_pullback_stop_multiplier: 1.0
  # ── Progressive trailing stop (disabled for minimal test) ──
  progressive_trail: false
  progressive_trail_schedule:
    0: 1.0
    1: 0.75
    2: 0.5
    3: 0.25
  pullback_trail_tighten: 0.75
  deep_pullback_trail_tighten: 0.5
  soft_exit:
    requires_indicators_reversed: 2
    requires_confirmation_tf: false
    urgency: "soft"
  soft_reversal_profit_threshold: 0.5
  near_sl_urgency_pct: 0.5

# ── Structure detection config ────────────────────────────────────────────────
structure:
  swing_lookback: 5
  min_swing_points: 4
  trend_violation_tolerance_pct: 0.5

learning:
  min_trades_before_adjusting: 15
  min_trades_per_signal: 10
  significance_level: 0.05
  rulebook_max_rules: 10
  retrain_every_n_trades: 5
  track_idle_cycles: true
  trajectory_lookback_hours: 24
  trajectory_min_hours: 4
  trajectory_thresholds:
    stable_consensus: 10
    gradual_alignment: 8
    earlier_min: 3
    recent_min: 2
    earlier_low: 2
    min_alignment: 4
  contrarian_win_rate: 30.0
  highlight_threshold: 75.0
  monitor_low_threshold: 55.0
  suppress_range: [45.0, 55.0]
  contrarian_threshold: 30.0

portfolio:
  max_positions: 1
  risk_per_trade_pct: 1.0
  leverage: 5
  max_total_risk_pct: 1.0
  fallback_equity_usdt: 1000.0
  correlation_check: false
  max_same_direction: 1
  atr_cap_equity_pct: 2.0        # ATR-based position cap: max % of equity allocated per trade based on volatility

risk:
  kelly_min: 0.05
  kelly_max: 0.25
  kelly_win_rate_base: 0.35
  kelly_win_rate_range: 0.40
  kelly_avg_win_r: 2.0
  max_size_pct_of_equity: 25.0
  min_size_pct_of_equity: 5.0

noise:
  conflict_max_ratio: 0.5
  volume_low_ratio: 0.7
  volume_very_low_ratio: 0.5
  adx_no_trend: 15
  adx_overextended: 40
  noise_severity_min_reasons: 2

telegram:
  idle_notify_every: 10

modules:
  macro_context: false
  regime_detection: false
  sentiment: false
  onchain: false
  liquidation: false
  model_consensus: false
  telegram_logs: false
  telegram_interaction: false
  
llm:
  enabled: false
  relax_factor: 0.8

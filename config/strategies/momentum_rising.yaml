# momentum_rising.yaml -- Primary strategy configuration
# Derived from strategy-template.yaml with momentum_rising defaults.
# The daemon reads this on every cycle. No restart needed to adjust.

description: |
  Enter long when momentum indicators start rising before price moves.
  This happens at structural support levels on 4h candles.
  Confirm with 1h price action before entry.
  Always set stop loss below the support level.
  Trail stops once price moves 0.5% in our direction.
  Never enter when the market is noisy or conflicting.
  Maximum 3 positions at once, 1% risk per trade.

strategy:
  name: momentum_rising
  uid: "e600dffb-8c47-4ac9-a32a-4a54becdcc45"   # Auto-generated on first load. Remove or clear to reset learning data.
  timeframe: "1h"
  confirmation_tf: "4h"
  max_positions: 3
  cycle_interval_minutes: 15

symbols:
  mode: "combined"                  # "combined" = always_watch + dynamic top-N from exchange
  always_watch:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  never_trade:
    - SHIBUSDT
    - BOMEUSDT
  dynamic_filter:
    universe_source: "exchange"     # Only 'exchange' is supported — do not change
    limit: 15                       # max dynamic symbols to select (ranked by momentum_quality)
    min_volume_24h_usd: 10000000    # minimum 24h volume filter (USD)
    min_open_interest_usd: 2000000  # minimum open interest filter (USD)
    min_r_squared: 0.15             # minimum R² for momentum quality — below this, symbol is filtered
    refresh_interval_hours: 4       # how often to re-fetch universe and re-rank

indicators:
  - name: "rsi"
    params:
      period: 14
    weight: 0.25
    description: "RSI below 30 = oversold. RSI above 70 = overbought. Look for bullish divergence at support."

  - name: "macd"
    params:
      fast: 12
      slow: 26
      signal: 9
    weight: 0.25
    description: "MACD histogram rising = momentum building before price confirms. Cross above signal = bullish."

  - name: "ema_stack"
    params:
      periods: [21, 55, 200]
    weight: 0.30
    description: "EMA 21 above 55 above 200 = bullish trend structure. Confirms directional bias."

  - name: "adx"
    params:
      period: 14
    weight: 0.20
    description: "ADX between 25 and 35 = healthy trend. Avoid entries when ADX above 40 (overextended) or below 15 (no trend)."

  - name: "atr"
    params:
      period: 14
    weight: 0.0
    description: "ATR determines stop loss width and entry zone size. Not a directional signal."

  - name: "sr_levels"
    params:
      tolerance: 0.004
      min_touches: 3
    weight: 0.0
    description: "Support and resistance levels define entry zones. Require at least 3 touches for validity."

scoring:
  entry_threshold: 6.5
  confluence_min_signals: 3
  rr_minimum: 2.0
  min_candidate_pct: 0.20
  rsi_signal_high: 55
  rsi_signal_low: 45
  momentum_cap: 1.5
  momentum_dampening: 0.5
  modifier_weights:
    volume: 0.15
    cvd: 0.1
    order_flow: 0.1
  label_thresholds:
    strong: 0.60
    weak: 0.33
  score_calibration:
    suppress_below_pct: 55
    highlight_above_pct: 75
    review_range_pct: [55, 60]

exit_rules:
  hard_stop:
    placement: "below_support"
    width_atr_multiplier: 1.5
    always_active: true
  trailing_stop:
    enabled: true
    activation_profit_pct: 0.5
    trail_atr_multiplier: 1.0
    breakeven_at_activation: true
    distance_pct: 1.0
    move_to_breakeven_at_pct: 1.5
  soft_exit:
    requires_indicators_reversed: 2
    requires_confirmation_tf: true
    urgency: "soft"
  soft_reversal_profit_threshold: 0.5
  near_sl_urgency_pct: 0.5

learning:
  min_trades_before_adjusting: 30
  min_trades_per_signal: 15
  significance_level: 0.05
  rulebook_max_rules: 10
  retrain_every_n_trades: 10
  track_idle_cycles: true
  trajectory_lookback_hours: 48
  trajectory_min_hours: 8
  trajectory_thresholds:
    stable_consensus: 10
    gradual_alignment: 8
    earlier_min: 3
    recent_min: 2
    earlier_low: 2
    min_alignment: 4
  contrarian_win_rate: 30.0
  highlight_threshold: 75.0
  monitor_low_threshold: 55.0
  suppress_range: [45.0, 55.0]
  contrarian_threshold: 30.0

portfolio:
  max_positions: 3
  risk_per_trade_pct: 1.0
  leverage: 5
  max_total_risk_pct: 3.0
  fallback_equity_usdt: 1000.0
  correlation_check: true
  max_same_direction: 3
  atr_cap_equity_pct: 2.0        # ATR-based position cap: max % of equity allocated per trade based on volatility

risk:
  kelly_min: 0.05
  kelly_max: 0.25
  kelly_win_rate_base: 0.35
  kelly_win_rate_range: 0.40
  kelly_avg_win_r: 2.0
  max_size_pct_of_equity: 25.0
  min_size_pct_of_equity: 5.0

noise:
  conflict_max_ratio: 0.5
  volume_low_ratio: 0.7
  volume_very_low_ratio: 0.5
  adx_no_trend: 15
  adx_overextended: 40
  noise_severity_min_reasons: 2

telegram:
  idle_notify_every: 10

modules:
  macro_context: false
  regime_detection: false
  sentiment: false
  onchain: false
  liquidation: false
  model_consensus: false
  telegram_logs: false
  telegram_interaction: false

llm:
  enabled: false
  relax_factor: 0.8

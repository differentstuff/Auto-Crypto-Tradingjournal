# default.yaml -- All system defaults.
# Never hand-edit this file. Override values in strategy YAML or exchange.yaml.
# The config loader merges: default.yaml < strategy.yaml < exchange.yaml
#
# IMPORTANT: strategy: section is intentionally ABSENT here.
# Required strategy keys (timeframe, confirmation_tf, max_positions,
# cycle_interval_minutes, direction_mode, long_weight, short_weight,
# reentry_cooldown_candles, reentry_require_signal_confirm) MUST be defined
# in every strategy YAML.
# If missing, ConfigLoader raises SubstrateConfigError naming the key and file.
# This prevents silent fallback to defaults that may be wrong for the strategy.

system:
  version: "2.0.0"
  name: "auto-trader"
  log_level: "INFO"
  data_dir: "data"
  reports_dir: "data/reports"

daemon:
  cycle_interval_minutes: 15
  max_cycle_steps: 20
  jitter_seconds: 30
  paper_mode: true  # safe default; exchange.yaml overrides to false when credentials present
  # If true, orders are written to log files instead of exchange
  substrate_state_max_rows: 200
  # Substrate state max rows removed — substrate is ephemeral (exchange-as-truth).
  # No persistence needed. Positions come from exchange, learning from DB tables.

exchange:
  primary: "bitget"      # Trading exchange (needs API keys for live mode only)
  data_source: "bitget"  # OHLCV data source (public, no API keys needed)
  fallback: "bybit"      # Fallback if data_source fails (public, no API keys needed)
  sync_interval_minutes: 5
  # Paper trading mode: all enzymes run, no real orders
  # Set to "paper" to log orders instead of placing them
  # Set to "live" to start trading
  mode: "paper"

# Cache TTLs (seconds)
cache:
  candle_ttl: 600        # 10 min
  indicator_ttl: 900     # 15 min
  macro_ttl: 300         # 5 min
  dominance_ttl: 1800    # 30 min
  onchain_ttl: 3600      # 1 hour
  regime_ttl: 14400      # 4 hours
  liquidation_ttl: 900   # 15 min

# Risk defaults (position sizing)
risk:
  kelly_min: 0.05
  kelly_max: 0.25
  kelly_win_rate_base: 0.35
  kelly_win_rate_range: 0.40
  kelly_avg_win_r: 2.0
  max_size_pct_of_equity: 25.0
  min_size_pct_of_equity: 5.0
  max_sl_pct: 3.0  # Hard cap: reject trade if SL distance exceeds this % (prevents unrealistic wide-SL trades)

# Exchange fees (Bitget VIP0 defaults)
# Used by paper trading and backtest to simulate realistic P&L.
# Live trading uses actual broker fills — never apply these to live data.
fees:
  taker_rate: 0.0006   # 0.06% per side (Bitget VIP0)
  maker_rate: 0.0002   # 0.02% per side (Bitget VIP0)

# Position sizing defaults
portfolio:
  risk_per_trade_pct: 2.0
  leverage: 5
  max_positions: 3
  max_total_risk_pct: 3.0
  fallback_equity_usdt: 1000.0
  correlation_check: true
  max_same_direction: 3
  max_same_direction_long: 3           # Fix 4: per-direction cap for longs
  max_same_direction_short: 3          # Fix 4: per-direction cap for shorts
  volatility_cap_pct: 20.0           # Volatility backstop: max % of equity per 1% ATR. Uses ATR% (relative) so it's asset-price-agnostic.
  max_notional_exposure_pct: 100.0   # Hard ceiling on notional as % of equity. Flash crash protection: limits exposure even at high leverage.

# Exit defaults
exit_rules:
  hard_stop:
    placement: "below_support"
    width_atr_multiplier: 1.5
    always_active: true
  trailing_stop:
    enabled: true
    activation_profit_pct: 0.5
    trail_atr_multiplier: 1.0
    breakeven_at_activation: true
    distance_pct: 1.0
    move_to_breakeven_at_pct: 1.5
  tp1_rr: 3.0        # TP1 R:R ratio — TP1 price = entry + risk × tp1_rr
  tp2_rr: 5.0        # TP2 R:R ratio — TP2 price = entry + risk × tp2_rr (must be > tp1_rr)
  tp1_sell_pct: 40.0  # % of total position to sell at TP1 (remainder keeps running with trailing stop)
  tp2_sell_pct: 40.0  # % of REMAINING position to sell at TP2 (100 = close all remaining)
  # ── Native trailing stop (daemon-offline backup) ────────────────────
  # Activates on exchange after TP1 hit. Wider than ATR-based stop.
  # Percentage = atr_multiplier × ATR / current_price × 100 at TP1 time.
  # Fallback to default_pct if ATR unavailable.
  native_trail:
    atr_multiplier: 2.0          # multiplier for native trail (must be > trail_atr_multiplier)
    default_pct: 5.0             # fallback if ATR unavailable
  soft_exit:
    requires_indicators_reversed: 2
    requires_confirmation_tf: true
    urgency: "soft"
  soft_reversal_profit_threshold: 0.5
  near_sl_urgency_pct: 0.5  # Near-SL urgency threshold (% distance from SL → high urgency)

# Scoring defaults
scoring:
  entry_threshold: 6.5
  approval_threshold: 4.5        # minimum effective_score after soft penalties to approve trade
  confluence_min_signals: 3
  rr_minimum: 2.5                # minimum R:R to approve trade — rejects setups where SL is too wide
  min_candidate_pct: 0.20
  rsi_signal_high: 55
  rsi_signal_low: 40                    # Fix 4: wider bearish signal band (was 45)
  momentum_cap: 1.5
  momentum_dampening: 0.5
  modifier_weights:
    volume: 0.15
    cvd: 0.1
    order_flow: 0.1
    volume_high_ratio: 1.5   # Volume above this confirms direction
    volume_low_ratio: 0.7    # Volume below this weakens direction
  label_thresholds:
    strong: 0.60
    weak: 0.33
  score_calibration:
    suppress_below_pct: 55
    highlight_above_pct: 75
    review_range_pct:
      - 55
      - 60
  # Scoring formula constants — internal normalization factors.
  # These define how raw indicator values map to contribution scores.
  # Final contribution = indicator_weight × formula_factor.
  # Do NOT change these casually — they define the scoring model's shape.
  # They are here for transparency, not for frequent tuning.
  formula:
    # RSI: maps RSI value to [-1, +1]. midpoint=50, scale=30 means
    # RSI 80 → (80-50)/30 = 1.0, RSI 20 → (20-50)/30 = -1.0
    rsi_midpoint: 50
    rsi_scale: 30.0
    # MACD: contribution when aligned+growing vs aligned+fading
    macd_aligned_growing: 1.0
    macd_aligned_fading: 0.5
    # EMA: full alignment vs partial alignment
    ema_full_alignment: 1.0
    ema_partial_alignment: 0.5
    # ADX: normalizes ADX value to [0, 1] by dividing by this value
    adx_scale: 50.0
    # WaveTrend: gold_buy signal, regular buy/sell signal, no-signal WT1 scale and cap
    wavetrend_gold_signal: 1.0
    wavetrend_signal: 0.85
    wavetrend_wt1_scale: 60.0
    wavetrend_no_signal_cap: 0.5
    # Volume: confirmation contribution when volume confirms direction,
    # penalty contribution when volume weakens direction
    volume_confirm: 0.5
    volume_weaken: -0.25
    # CVD: contribution for rising/falling trend
    cvd_trend: 0.4
    # Order flow: contribution for buying/selling pressure
    order_flow_pressure: 0.15
    # MFI: threshold for significant MFI deviation, contribution per deviation
    mfi_threshold: 10
    mfi_contribution: 0.3

# Learning defaults
learning:
  min_trades_before_adjusting: 30
  min_trades_per_signal: 15
  significance_level: 0.05
  rulebook_max_rules: 10
  retrain_every_n_trades: 10
  track_idle_cycles: true
  trajectory_lookback_hours: 48
  trajectory_min_hours: 8
  trajectory_thresholds:
    stable_consensus: 10
    gradual_alignment: 8
    earlier_min: 3
    recent_min: 2
    earlier_low: 2
    min_alignment: 4
  # Verdict classification thresholds
  contrarian_win_rate: 30.0
  highlight_threshold: 75.0
  monitor_low_threshold: 55.0
  suppress_range: [45.0, 55.0]
  contrarian_threshold: 30.0
  # Weight adjustment multipliers (applied by weight_adjuster.py)
  # "valid" verdict → weight × boost, "review" verdict → weight × reduce
  # These are single-pass factors, not compounded with indicator weights.
  adjustment_boost: 1.2        # +20% for signals with ≥75% accuracy
  adjustment_review_reduce: 0.9  # -10% for borderline signals (30-45% accuracy)

# Default indicator config (overridden by strategy)
indicators:
  - name: "rsi"
    params:
      period: 14
    weight: 0.25
    description: "RSI below 30 = oversold. RSI above 70 = overbought."
  - name: "macd"
    params:
      fast: 12
      slow: 26
      signal: 9
    weight: 0.25
    description: "MACD histogram rising = momentum building."
  - name: "ema_stack"
    params:
      periods: [21, 55, 200]
    weight: 0.30
    description: "EMA 21 above 55 above 200 = bullish trend structure."
  - name: "adx"
    params:
      period: 14
    weight: 0.20
    description: "ADX 25-35 = healthy trend. Avoid >40 or <15."
  - name: "atr"
    params:
      period: 14
    weight: 0.0
    description: "ATR for SL width and position sizing, not scoring."
  - name: "sr_levels"
    params:
      tolerance: 0.004
      min_touches: 3
    weight: 0.0
    description: "S/R levels for entry zone validation, not scoring."
  - name: "momentum_quality"
    params:
      ranking_window: 90
      min_r_squared: 0.15
      lookback_short: 30
      lookback_long: 90
      r_squared_high: 0.5
      r_squared_low: 0.3
    weight: 0.0
    description: "Momentum quality ranking (slope × R²) for dynamic symbol filter."

# HMM regime detection (disabled by default)
# When enabled, DetectRegime enzyme fits a 2-state GaussianHMM on hourly
# log-returns and blocks entries during high-volatility Spike regimes.
hmm:
  enabled: false
  lookback_days: 30            # days of hourly data for model fitting
  confidence_threshold: 0.70   # min prob_normal to consider regime Normal
  refit_interval_days: 7       # refit model weekly
  min_bars: 720                # minimum hourly bars needed to fit (30 days × 24h)
  n_restarts: 3                # multi-start optimization to avoid local optima

# Challenger system (disabled by default)
# When enabled, weight adjustments go through the CandidateQueue and
# must pass challenger paper-trading validation before reaching production.
challenger:
  enabled: false
  min_trades: 5                 # minimum hypothetical trades before evaluation
  min_improvement: 0.05          # minimum profit factor improvement (0.05 = 5%) to promote

# Karpathy experiment loop (disabled by default)
# Proposes one parameter change at a time, backtests, pushes to CandidateQueue.
karpathy:
  enabled: false
  step_size: 0.05               # weight change per experiment step
  max_experiments_per_cycle: 1  # experiments per daemon cycle
  min_trades_for_eval: 20       # minimum historical trades needed for evaluation
  interval_hours: 24            # minimum hours between experiment cycles

# Hyperopt prefilter (disabled by default)
# Systematic parameter search via Optuna TPE, pushes top candidates to CandidateQueue.
# Composite objective: profit_factor * (1 + sharpe_alpha * max(0, sharpe_ratio))
# This prefers stable weight combinations over erratic ones with the same raw PF.
# Post-search PBO check: warns if Probability of Backtest Overfitting > 0.5.
hyperopt:
  enabled: false
  n_trials: 100                 # Optuna trials per search
  top_n_candidates: 3           # candidates pushed to queue per search
  search_interval_hours: 24     # minimum hours between searches
  search_width: 0.5             # neighborhood radius around current weights (±0.5 per indicator)
  min_trades_for_eval: 20       # minimum historical trades needed for evaluation
  sharpe_alpha: 0.3             # Sharpe bonus weight in composite score (0 = PF only)

# Threshold evaluator (disabled by default)
# Compares production vs exploration bucket accuracy.
# Proposes threshold changes to CandidateQueue when exploration outperforms.
threshold_evaluator:
  enabled: false
  min_trades: 30
  min_improvement_pct: 20.0
  min_confidence_gap: 0.10
  cooldown_hours: 48

# Walk-Forward + PBO validation (disabled by default)
# Multi-window walk-forward analysis with Probability of Backtest Overfitting.
# Strategies must survive ALL windows (no negative Sharpe) and pass PBO/WFE thresholds.
walk_forward_pbo:
  enabled: false
  n_windows: 5                  # number of expanding windows (>= 2 recommended)
  train_ratio: 0.7              # 70% train, 30% test per window
  n_trials: 50                  # Optuna trials per window optimization
  wfe_threshold: 0.5            # Walk-Forward Efficiency must exceed this to pass
  pbo_threshold: 0.5            # PBO must be below this to pass (lower = less overfitting)

# Modules (all off by default)
modules:
  macro_context: false
  regime_detection: false
  sentiment: false
  onchain: false
  liquidation: false
  model_consensus: false
  telegram_logs: false
  telegram_interaction: false
  external_signals: false     # CollectExternalSignals enzyme (funding, FGI, liquidations)

# External confluence signals (Kaizen-inspired)
# When modules.external_signals is true, the CollectExternalSignals enzyme
# fetches funding rate, Fear & Greed Index, and liquidation data from free APIs.
# Produces confluence signals: funding_squeeze, fgi_contrarian, liquidation_cascade.
external:
  funding_squeeze_threshold: -0.0003   # funding rate below this → squeeze signal (default -0.03% per 8h)
  fgi_contrarian_threshold: 20         # FGI at or below this → contrarian long signal (extreme fear)
  liquidation_cascade_usd: 250000      # USD threshold for 5min liquidation cascade
  liquidation_window_seconds: 300      # time window for cascade detection (5 min)
  cache_ttl: 3600                      # cache TTL for API responses (1 hour default)

# Default symbol watchlist
symbols:
  mode: "static"                    # "static" = always_watch only | "combined" = always_watch + dynamic top-N
  always_watch:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  never_trade:
    - SHIBUSDT
    - BOMEUSDT
  dynamic_filter:
    universe_source: "exchange"     # Only 'exchange' is supported — do not change
    limit: 15                       # max dynamic symbols to select (ranked by momentum_quality)
    min_volume_24h_usd: 10000000    # minimum 24h volume filter (USD)
    min_open_interest_usd: 2000000  # minimum open interest filter (USD)
    min_r_squared: 0.15             # minimum R² for momentum quality — below this, symbol is filtered
    refresh_interval_hours: 4       # how often to re-fetch universe and re-rank

# Macro context thresholds (used by CollectMacroContext)
macro:
  vix_risk_off: 30            # VIX above this → risk-off regime
  vix_neutral: 20             # VIX above this (but below risk_off) → neutral regime
  yfinance_period: "2d"       # yfinance download period for VIX/DXY
  yfinance_interval: "1h"     # yfinance download interval for VIX/DXY
  fear_greed_url: "https://api.alternative.me/fng/?limit=1"
  dominance_url: "https://api.coingecko.com/api/v3/global"
  calendar_url: "https://nfs.faireconomy.media/ff_calendar_thisweek.json"

# Data fetch defaults
exchange:
  ohlcv_limit: 200             # Number of candles to fetch per OHLCV call

# Noise defaults (strategy-level, can be overridden)
noise:
  conflict_max_ratio: 0.5         # max ratio of conflicting signals (relative threshold, replaces absolute conflict_signal_threshold)
  volume_low_ratio: 0.7
  volume_very_low_ratio: 0.5
  adx_no_trend: 15
  adx_overextended: 40
  noise_severity_min_reasons: 2
  # liquidity_filter_hours removed — time-of-day is a poor proxy for liquidity.
  # Volume-based checks (volume_low_ratio, volume_very_low_ratio) already measure
  # actual liquidity directly. Fixed UTC hour ranges are region-biased.

# ISC (hard-to-vary conditions) — config-driven, no hardcoded IDs
# Each condition is fully defined here. substrate.py reads these at init.
validity:
  - id: ISC-001
    criterion: "entry_threshold met before any trade opens"
    verification: "analysis.candidates not empty AND score >= threshold"
    field: "analysis.candidates"
    operator: "any_score_gte"
    value_ref: "scoring.entry_threshold"
    field_key: "score"
  - id: ISC-002
    criterion: "stop loss always set before position opens"
    verification: "decisions.trade_approved.sl_price > 0"
    field: "decisions.trade_approved"
    operator: "sl_set_or_no_trade"
    value_ref: ""
    field_key: "sl_price"
  - id: ISC-003
    criterion: "position size within risk limit"
    verification: "trade_approved.size_usdt <= equity * risk_per_trade_pct / 100"
    field: "decisions.trade_approved"
    operator: "size_within_risk"
    value_ref: ""
    field_key: "size_usdt"
  - id: ISC-004
    criterion: "max concurrent positions not exceeded"
    verification: "portfolio.open_positions count < strategy.max_positions"
    field: "portfolio.open_positions"
    operator: "count_lt"
    value_ref: "strategy.max_positions"
    field_key: ""

# Soft penalties — replace former hard-gate ISCs (005/006/007)
# These reduce the effective score instead of blocking trades entirely.
# effective_score = raw_score × (1 - noise_penalty) × (1 - confluence_penalty) × (1 - trajectory_penalty)
# A trade with penalties applied still needs to meet scoring.approval_threshold to proceed.
soft_penalties:
  noise_penalty_ratio: 0.3        # penalty when noise detected (0.0 = no penalty, 1.0 = full block)
  confluence_penalty_ratio: 0.3   # penalty when indicators_aligned < confluence_min_signals
  trajectory_penalty_ratio: 0.5   # penalty when coincidence_risk is high (sudden coincidence)
  trajectory_medium_ratio: 0.2    # penalty when coincidence_risk is medium (diverging)

# System-level sync defaults
sync:
  position_sync_every_n_cycles: 5